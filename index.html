<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Իմ քարտեզային նախագիծ</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f2f2f2;
    }

    h1 {
      color: #2c3e50;
    }

    nav {
      background: #2c3e50;
      padding: 10px;
      margin-bottom: 20px;
    }

    nav a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }

    #map {
      height: 400px;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- 🟢 ՄԵՆՅՈՒ -->
<nav>
  <a href="#water">🌊 Ջրային ռեսուրսներ</a>
  <a href="#biodiversity">🌿 Կենսաբազմազանություն</a>
  <a href="#map">🗺 Քարտեզ</a>
</nav>

<h1>🌍 Իմ քարտեզային կայքը</h1>

<!-- 🟢 ԲԱԺԻՆ 1 -->
<section id="water">
  <h2>🌊 Ջրային ռեսուրսների պահպանություն</h2>
  <p>
    Ջուրը շատ կարևոր բնական ռեսուրս է։ Պետք է խնայել և չաղտոտել այն։
  </p>
</section>

<!-- 🟢 ԲԱԺԻՆ 2 -->
<section id="biodiversity">
  <h2>🌿 Կենսաբազմազանության պահպանություն</h2>
  <p>
    Բնության և կենդանիների պաշտպանությունը կարևոր է մեր մոլորակի համար։
  </p>
</section>

<!-- 🟢 ՔԱՐՏԵԶ -->
<section id="map">
  <h2>🗺 Քարտեզ</h2>
  <div id="map"></div>
</section>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([40.1792, 44.4991], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  L.marker([40.1792, 44.4991]).addTo(map)
    .bindPopup("📍 Երևան")
    .openPopup();
</script>

</body>
</html>
